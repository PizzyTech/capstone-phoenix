# Template only — DO NOT put real values in this file.
# The .gitignore blocks *secret*.yaml but allows *secret*.example.yaml.
#
# To create the real Secret out-of-band (not tracked by GitOps), run:
#   kubectl create secret generic backend-secret -n taskapp \
#     --from-literal=DATABASE_USER=<real-user> \
#     --from-literal=DATABASE_PASSWORD=<real-password> \
#     --from-literal=SECRET_KEY=<real-flask-secret-key>
#
# Argo CD's Application should exclude this resource from pruning/sync
# so it never overwrites or deletes the out-of-band Secret.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: taskapp
type: Opaque
stringData:
  DATABASE_USER: "CHANGE_ME"
  DATABASE_PASSWORD: "CHANGE_ME"
  SECRET_KEY: "CHANGE_ME"
