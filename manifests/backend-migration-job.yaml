apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migration
  namespace: taskapp
spec:
  backoffLimit: 4
  template:
    spec:
      containers:
      - command:
        - alembic
        - upgrade
        - head
        env:
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DATABASE_PORT
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DATABASE_NAME
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              key: DATABASE_USER
              name: backend-secret
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              key: DATABASE_PASSWORD
              name: backend-secret
        image: ghcr.io/ts-a-devops/taskapp-backend:5d6b8fc
        imagePullPolicy: IfNotPresent
        name: migration
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
      restartPolicy: OnFailure
